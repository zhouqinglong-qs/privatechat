<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私聊 · PrivateChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #2a2a3d;
      --accent: #7c6af7;
      --accent2: #a89bff;
      --text: #e8e8f2;
      --text2: #8888a8;
      --msg-self-bg: #2d2268;
      --msg-self-text: #ccc0ff;
      --msg-other-bg: #1e1e2a;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --r: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ============ LOGIN ============ */
    #login-screen {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      max-height: 100dvh;
    }
    .logo { text-align: center; padding: 8px 0 4px; }
    .logo-icon { font-size: 44px; display: block; margin-bottom: 6px; }
    .logo h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #7c6af7, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo p { color: var(--text2); font-size: 12px; margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
    }
    .card-title {
      font-size: 11px; font-weight: 700; color: var(--text2);
      letter-spacing: 1.5px; margin-bottom: 14px; text-transform: uppercase;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--text2); }

    .inp { width: 100%; padding: 11px 14px; font-size: 14px; display: block; margin-bottom: 10px; }
    .inp-code {
      width: 100%; padding: 14px; font-size: 22px; font-weight: 700;
      text-align: center; letter-spacing: 8px; font-family: monospace; margin-bottom: 10px;
    }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); }

    .divider {
      text-align: center; color: var(--text2); font-size: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .code-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; text-align: center; margin-top: 14px;
    }
    .code-big {
      font-size: 30px; font-weight: 800; letter-spacing: 8px;
      color: var(--accent2); font-family: monospace;
    }
    .code-hint { font-size: 12px; color: var(--text2); margin-top: 6px; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
    .mini-btn {
      border: 1px solid var(--accent); color: var(--accent2); background: none;
      border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer;
      transition: all .2s;
    }
    .mini-btn:hover { background: var(--accent); color: #fff; }

    .wait-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 12px; color: var(--text2); font-size: 13px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ CHAT ============ */
    #chat-screen {
      display: none; flex-direction: column;
      width: 100%; height: 100dvh;
      max-width: 860px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-sub { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text2);
      transition: background .3s;
    }
    .dot.on { background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .hbtn {
      background: none; border: 1px solid var(--border); color: var(--text2);
      border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer;
      transition: all .2s;
    }
    .hbtn:hover { border-color: var(--accent); color: var(--accent2); }

    /* messages */
    .msgs {
      flex: 1; overflow-y: auto; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .msgs::-webkit-scrollbar { width: 4px; }
    .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sys {
      text-align: center; font-size: 11px; color: var(--text2);
      background: var(--surface2); border-radius: 20px; padding: 4px 14px;
      align-self: center; max-width: 80%; border: 1px solid var(--border);
    }

    .wait-banner {
      background: linear-gradient(135deg, rgba(124,106,247,.12), rgba(192,132,252,.08));
      border: 1px solid rgba(124,106,247,.3);
      border-radius: var(--r); padding: 20px; text-align: center; margin: 8px 0;
    }
    .wait-banner .wc { font-size: 34px; font-weight: 800; letter-spacing: 10px; color: var(--accent2); font-family: monospace; margin: 8px 0; }
    .wait-banner p { color: var(--text2); font-size: 13px; }

    .msg-row { display: flex; flex-direction: column; gap: 2px; }
    .msg-row.me { align-items: flex-end; }
    .msg-row.them { align-items: flex-start; }

    .bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.6; word-break: break-word;
      white-space: pre-wrap;
    }
    .me .bubble { background: var(--msg-self-bg); color: var(--msg-self-text); border-bottom-right-radius: 4px; }
    .them .bubble { background: var(--msg-other-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble.recalled { background: transparent !important; border: 1px dashed var(--border) !important; color: var(--text2) !important; font-style: italic; }

    .msg-meta {
      font-size: 11px; color: var(--text2);
      display: flex; align-items: center; gap: 6px; padding: 0 2px;
    }
    .burn-tag { font-size: 10px; color: var(--orange); background: rgba(251,146,60,.12); padding: 1px 6px; border-radius: 4px; }
    .recall-btn {
      background: none; border: none; color: transparent; font-size: 11px;
      cursor: pointer; padding: 0; transition: color .2s;
    }
    .msg-row.me:hover .recall-btn { color: var(--text2); }
    .recall-btn:hover { color: var(--red) !important; }

    /* typing */
    .typing-row { display: flex; align-items: flex-start; }
    .typing-bubble {
      background: var(--msg-other-bg); border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 12px 16px; display: flex; gap: 4px; align-items: center;
    }
    .typing-bubble span {
      width: 6px; height: 6px; background: var(--text2); border-radius: 50%;
      animation: ty 1.4s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes ty { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-5px);opacity:1} }

    /* input area */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 14px 14px;
    }
    .opts { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
    .opt-label { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    select { padding: 4px 8px; font-size: 12px; border-radius: 6px; color: var(--text); cursor: pointer; }
    select:focus { border-color: var(--accent); }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-ta {
      flex: 1; padding: 10px 14px; font-size: 14px; border-radius: 10px;
      resize: none; min-height: 42px; max-height: 120px; line-height: 1.5;
    }
    .send-btn {
      width: 42px; height: 42px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent2); transform: scale(1.06); }
    .send-btn:disabled { opacity: .35; cursor: default; }

    .e2e { text-align: center; font-size: 11px; color: var(--text2); padding-top: 8px; }

    /* toast */
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 9px 20px; border-radius: 20px;
      font-size: 13px; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 9999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .bubble { max-width: 86%; }
    }
  </style>
</head>
<body>

<!-- ===== 登录页 ===== -->
<div id="login-screen">
  <div class="logo">
    <span class="logo-icon">🔒</span>
    <h1>PrivateChat</h1>
    <p>端对端加密 · 阅后即焚 · 实时通信 · 零服务器存储</p>
  </div>

  <!-- 创建房间 -->
  <div class="card">
    <div class="card-title">创建聊天房间</div>
    <input class="inp" type="text" id="create-name" placeholder="你的昵称（可选，留空随机生成）" maxlength="20">
    <button class="btn btn-primary" onclick="App.createRoom()">创建房间 →</button>

    <div id="created-box" class="hidden">
      <div class="code-box">
        <div class="code-big" id="show-code">------</div>
        <div class="code-hint">把这个 6 位码发给对方，让他加入</div>
      </div>
      <div class="btn-row">
        <button class="mini-btn" onclick="App.copyCode()">📋 复制房间码</button>
        <button class="mini-btn" onclick="App.copyLink()">🔗 复制邀请链接</button>
      </div>
      <div class="wait-row">
        <div class="spinner" id="wait-spin"></div>
        <span id="wait-txt">等待对方加入...</span>
      </div>
    </div>
  </div>

  <div class="divider">或者</div>

  <!-- 加入房间 -->
  <div class="card">
    <div class="card-title">加入聊天房间</div>
    <input class="inp" type="text" id="join-name" placeholder="你的昵称（可选）" maxlength="20">
    <input class="inp-code inp" type="text" id="join-code" placeholder="输入 6 位房间码" maxlength="6"
      oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-secondary" onclick="App.joinRoom()">加入房间 →</button>
  </div>

  <div class="e2e">🔐 消息使用 AES-256-GCM 加密，通过 WebRTC P2P 直连传输，无中间服务器</div>
</div>

<!-- ===== 聊天页 ===== -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="avatar" id="hd-avatar">?</div>
    <div class="header-info">
      <div class="header-name" id="hd-name">私聊房间</div>
      <div class="header-sub">
        <div class="dot" id="hd-dot"></div>
        <span id="hd-status">连接中...</span>
      </div>
    </div>
    <button class="hbtn" onclick="App.clearChat()" title="清空">🗑️</button>
    <button class="hbtn" onclick="App.leave()" title="离开">🚪</button>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="input-area">
    <div class="opts">
      <label class="opt-label">
        🔥 阅后即焚：
        <select id="burn-sel">
          <option value="0">关闭</option>
          <option value="10">10 秒</option>
          <option value="30">30 秒</option>
          <option value="60">1 分钟</option>
          <option value="300">5 分钟</option>
        </select>
      </label>
    </div>
    <div class="input-row">
      <textarea class="msg-ta" id="ta" placeholder="输入消息… Enter 发送，Shift+Enter 换行"
        oninput="App.taResize(this)"
        onkeydown="App.taKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="App.send()" disabled>➤</button>
    </div>
    <div class="e2e">🔐 P2P 加密传输中</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- PeerJS CDN -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ================================================================
//  PrivateChat — P2P + AES-256-GCM 端对端加密聊天
//  依赖：PeerJS (WebRTC 信令)，不依赖任何自建后端
// ================================================================
const App = (() => {
  // ---- 状态 ----
  let peer = null;        // PeerJS 实例
  let conn = null;        // DataConnection
  let myId = '';          // 我的 Peer ID（= 房间码）
  let myName = '';
  let roomCode = '';
  let encKey = null;      // CryptoKey
  let msgIdCounter = 0;
  let typingTimer = null;
  let isOnline = false;

  // ---- 随机昵称 ----
  const ADJ = ['神秘','隐匿','暗夜','流云','静水','幽深','晨雾','星尘','轻烟','深海'];
  const NOUN = ['旅人','使者','影子','光点','回声','浪花','月影','风铃','过客','守夜人'];
  const rndName = () => ADJ[Math.floor(Math.random()*ADJ.length)] + NOUN[Math.floor(Math.random()*NOUN.length)];
  const rndId   = () => Math.random().toString(36).slice(2,10);

  // ---- 加密 (AES-256-GCM) ----
  async function deriveKey(code) {
    const raw = await crypto.subtle.importKey('raw',
      new TextEncoder().encode('PC1_' + code), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:new TextEncoder().encode('pcsalt2024'), iterations:100000, hash:'SHA-256'},
      raw, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
    );
  }
  async function enc(txt) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, encKey, new TextEncoder().encode(txt));
    const buf = new Uint8Array(12 + ct.byteLength);
    buf.set(iv); buf.set(new Uint8Array(ct), 12);
    return btoa(String.fromCharCode(...buf));
  }
  async function dec(b64) {
    try {
      const buf = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
      const pt  = await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)}, encKey, buf.slice(12));
      return new TextDecoder().decode(pt);
    } catch { return '[解密失败]'; }
  }

  // ---- 工具 ----
  function toast(msg, ms=2500) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), ms);
  }
  function ftime(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  function scroll() {
    const el = document.getElementById('msgs');
    setTimeout(()=>{ el.scrollTop = el.scrollHeight; }, 30);
  }
  function setStatus(state, name='') {
    const dot = document.getElementById('hd-dot');
    const st  = document.getElementById('hd-status');
    const hdn = document.getElementById('hd-name');
    const av  = document.getElementById('hd-avatar');
    if (state==='wait') {
      dot.className='dot'; st.textContent='等待对方加入...';
      hdn.textContent='房间 · '+roomCode; av.textContent='🔒';
    } else if (state==='on') {
      dot.className='dot on'; st.textContent='在线';
      hdn.textContent = name||'匿名用户';
      av.textContent = (name||'?')[0];
      document.getElementById('send-btn').disabled = false;
      isOnline = true;
    } else if (state==='off') {
      dot.className='dot'; dot.style.background='var(--red)';
      st.textContent='对方已离线';
      isOnline = false;
    }
  }
  function sysMsg(txt) {
    const el = document.createElement('div');
    el.className='sys'; el.textContent=txt;
    document.getElementById('msgs').appendChild(el);
    scroll();
  }

  // ---- 渲染消息 ----
  function renderMsg({id, text, isSelf, recalled, burnAfter, ts}) {
    const area = document.getElementById('msgs');
    // 移除打字指示器
    const ti = document.getElementById('typing-ind');
    if (ti) ti.remove();

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isSelf ? 'me' : 'them');
    row.id = 'msg-' + id;

    const burnTag = burnAfter>0
      ? `<span class="burn-tag">🔥 ${burnAfter<60?burnAfter+'秒':burnAfter/60+'分钟'}后销毁</span>` : '';
    const rcBtn = isSelf
      ? `<button class="recall-btn" onclick="App.recall('${id}')">撤回</button>` : '';

    if (recalled) {
      row.innerHTML = `<div class="bubble recalled">消息已撤回</div><div class="msg-meta">${ftime(ts)}</div>`;
    } else {
      row.innerHTML = `
        <div class="bubble">${esc(text)}</div>
        <div class="msg-meta">${ftime(ts)} ${burnTag} ${rcBtn}</div>`;
    }
    area.appendChild(row);
    scroll();

    if (burnAfter>0 && !recalled) scheduleBurn(id, burnAfter);
  }

  function scheduleBurn(id, sec) {
    setTimeout(()=>{
      const el = document.getElementById('msg-'+id);
      if (!el) return;
      el.style.transition='opacity .5s'; el.style.opacity='0';
      setTimeout(()=>el.remove(), 500);
    }, sec*1000);
  }

  // ---- PeerJS 核心 ----
  function initPeer(id) {
    return new Promise((resolve, reject) => {
      const p = new Peer(id, {
        config: {
          iceServers: [
            {urls: 'stun:stun.l.google.com:19302'},
            {urls: 'stun:stun1.l.google.com:19302'},
          ]
        }
      });
      p.on('open', rid => { myId=rid; resolve(p); });
      p.on('error', e => {
        console.error('Peer error:', e);
        reject(e);
      });
    });
  }

  function setupConn(c, peerNameIn) {
    conn = c;
    conn.on('open', () => {
      setStatus('on', peerNameIn||'匿名用户');
      sysMsg('🔐 端对端加密通道已建立，双方实时连接');
      // 互相告知自己的昵称
      sendRaw({type:'hello', name:myName});
    });
    conn.on('data', async raw => {
      await handleData(raw);
    });
    conn.on('close', () => {
      setStatus('off');
      sysMsg('⚠️ 对方已断开连接');
    });
    conn.on('error', e => {
      console.error('conn error', e);
      toast('连接出错: ' + e.message);
    });
  }

  async function handleData(raw) {
    if (raw.type === 'hello') {
      setStatus('on', raw.name);
      sysMsg('🔐 ' + raw.name + ' 加入，加密通道已建立');
      return;
    }
    if (raw.type === 'typing') {
      showTyping(); return;
    }
    if (raw.type === 'recall') {
      const el = document.getElementById('msg-'+raw.id);
      if (el) {
        const b = el.querySelector('.bubble');
        if (b) { b.classList.add('recalled'); b.innerHTML='消息已撤回'; }
        const m = el.querySelector('.msg-meta');
        if (m) m.textContent=ftime(Date.now());
      }
      return;
    }
    if (raw.type === 'msg') {
      const text = await dec(raw.enc);
      renderMsg({ id:raw.id, text, isSelf:false, recalled:false, burnAfter:raw.burnAfter, ts:raw.ts });
      return;
    }
  }

  function sendRaw(obj) {
    if (conn && conn.open) conn.send(obj);
  }

  // ---- 打字指示器 ----
  function showTyping() {
    let ti = document.getElementById('typing-ind');
    if (!ti) {
      ti = document.createElement('div');
      ti.id='typing-ind'; ti.className='typing-row';
      ti.innerHTML=`<div class="typing-bubble"><span></span><span></span><span></span></div>`;
      document.getElementById('msgs').appendChild(ti);
      scroll();
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>{ const t=document.getElementById('typing-ind'); if(t)t.remove(); }, 3000);
  }

  // ================================================================
  //  Public API
  // ================================================================

  async function createRoom() {
    const name = document.getElementById('create-name').value.trim() || rndName();
    myName = name;
    roomCode = Math.random().toString(36).slice(2,8).toUpperCase();

    try {
      encKey = await deriveKey(roomCode);
      peer = await initPeer('pc-' + roomCode);
    } catch(e) {
      toast('❌ 初始化失败，请刷新重试');
      console.error(e); return;
    }

    // 显示房间码
    document.getElementById('show-code').textContent = roomCode;
    document.getElementById('created-box').classList.remove('hidden');

    // 等待对方连接
    peer.on('connection', c => {
      setupConn(c, '');
      // 隐藏等待提示
      document.getElementById('wait-spin').style.display='none';
      document.getElementById('wait-txt').textContent='对方已加入！';
      // 若还在登录页，跳转聊天页
      if (document.getElementById('login-screen').style.display !== 'none') {
        enterChat(name);
      }
    });

    toast('房间已创建，等待对方加入...');
  }

  async function joinRoom() {
    const name = document.getElementById('join-name').value.trim() || rndName();
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    if (code.length !== 6) { toast('❌ 请输入 6 位房间码'); return; }

    myName = name;
    roomCode = code;

    try {
      encKey = await deriveKey(roomCode);
      peer = await initPeer('pc-join-' + rndId());
    } catch(e) {
      toast('❌ 初始化失败，请刷新重试');
      console.error(e); return;
    }

    toast('正在连接...');
    const c = peer.connect('pc-' + code, { reliable: true });
    setupConn(c, '');
    enterChat(name);
  }

  function enterChat(name) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    setStatus('wait');

    if (!document.getElementById('wait-banner-el')) {
      const wb = document.createElement('div');
      wb.className='wait-banner'; wb.id='wait-banner-el';
      wb.innerHTML=`
        <p>把房间码发给朋友</p>
        <div class="wc">${roomCode}</div>
        <p style="opacity:.7;font-size:12px">连接成功后自动建立加密通道 🔐</p>
        <div class="btn-row" style="justify-content:center">
          <button class="mini-btn" onclick="App.copyCode()">📋 复制房间码</button>
          <button class="mini-btn" onclick="App.copyLink()">🔗 复制邀请链接</button>
        </div>`;
      document.getElementById('msgs').appendChild(wb);
    }
  }

  async function send() {
    const ta = document.getElementById('ta');
    const text = ta.value.trim();
    if (!text || !conn || !conn.open) return;

    const burnAfter = parseInt(document.getElementById('burn-sel').value);
    const id = 'msg-' + Date.now() + '-' + (msgIdCounter++);
    const ts = Date.now();

    ta.value = ''; ta.style.height='auto';
    document.getElementById('send-btn').disabled = true;

    // 先本地渲染
    renderMsg({ id, text, isSelf:true, recalled:false, burnAfter, ts });

    // 加密发送
    const ciphertext = await enc(text);
    sendRaw({ type:'msg', id, enc:ciphertext, burnAfter, ts });
  }

  function recall(id) {
    const el = document.getElementById('msg-'+id);
    if (!el) return;
    const b = el.querySelector('.bubble');
    if (b) { b.classList.add('recalled'); b.innerHTML='消息已撤回'; }
    const m = el.querySelector('.msg-meta');
    if (m) m.textContent=ftime(Date.now());
    sendRaw({ type:'recall', id });
  }

  function taResize(el) {
    el.style.height='auto';
    el.style.height = Math.min(el.scrollHeight,120)+'px';
    document.getElementById('send-btn').disabled = (el.value.trim()==='' || !conn || !conn.open);
    // 发打字通知（防抖 2s）
    sendRaw({type:'typing'});
  }

  function taKey(e) {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function copyCode() {
    navigator.clipboard.writeText(roomCode).then(()=>toast('✅ 房间码已复制！'));
  }

  function copyLink() {
    const link = location.href.split('?')[0] + '?room=' + roomCode;
    navigator.clipboard.writeText(link).then(()=>toast('✅ 邀请链接已复制！'));
  }

  function clearChat() {
    document.getElementById('msgs').innerHTML='';
    sysMsg('🗑️ 聊天记录已清空（仅本地）');
  }

  function leave() {
    if (!confirm('确定离开聊天室吗？')) return;
    if (conn) conn.close();
    if (peer) peer.destroy();
    location.reload();
  }

  // ---- URL 参数自动填码 ----
  window.addEventListener('load', ()=>{
    const code = new URLSearchParams(location.search).get('room');
    if (code) {
      document.getElementById('join-code').value = code.toUpperCase();
      toast('已自动填入房间码，输入昵称后加入！');
    }
  });

  return { createRoom, joinRoom, send, recall, taResize, taKey,
           copyCode, copyLink, clearChat, leave };
})();
</script>
</body>
</html>
